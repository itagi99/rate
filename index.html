<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ANP Mart - Live Rates</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Ensures smooth scrolling on mobile */
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Loading spinner */
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #2563eb; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 font-sans antialiased text-gray-800">

    <div id="loginScreen" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl shadow-lg w-full max-w-sm border border-gray-100">
            <h2 class="text-2xl font-black text-center text-blue-700 mb-6 tracking-tight">ANP Mart Login</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition shadow-md">Login</button>
                <p id="loginError" class="text-red-500 text-sm text-center hidden font-medium">Invalid credentials</p>
                <div class="text-xs text-gray-400 text-center mt-4">
                    Admin: admin / admin123<br>Viewer: a / a123
                </div>
            </div>
        </div>
    </div>

    <div id="appScreen" class="hidden pb-24">
        
        <div class="bg-blue-700 p-4 text-white sticky top-0 z-20 shadow-md flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold tracking-tight">ANP Mart Rates</h1>
                <p class="text-xs text-blue-200" id="userRoleDisplay">Live Inventory</p>
            </div>
            <button onclick="logout()" class="text-xs bg-blue-800 px-3 py-1.5 rounded-full border border-blue-600 hover:bg-blue-900 transition font-medium">Logout</button>
        </div>

        <div class="p-3 bg-white border-b flex gap-2 shadow-sm sticky top-[68px] z-10">
            <div class="relative w-2/3">
                <input type="text" id="searchInput" placeholder="Search products or remarks..." class="w-full pl-3 pr-8 py-2.5 text-sm border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
            </div>
            <select id="categoryFilter" class="w-1/3 px-2 py-2.5 text-sm border border-gray-300 rounded-lg bg-gray-50 outline-none font-medium text-gray-700">
                <option value="ALL">All Categories</option>
            </select>
        </div>

        <div class="overflow-x-auto bg-white hide-scrollbar">
            <table class="w-full text-left border-collapse min-w-[600px]">
                <thead>
                    <tr class="bg-gray-100 text-gray-600 uppercase text-[10px] font-bold tracking-wider border-y border-gray-200">
                        <th class="py-3 px-3 w-10 text-center">SL</th>
                        <th class="py-3 px-3 w-64">Product & Conversions</th>
                        <th class="py-3 px-3 text-center">Basic (₹)</th>
                        <th class="py-3 px-3 text-center">Whole (₹)</th>
                        <th class="py-3 px-3 text-center">Stock</th>
                        <th id="editColHeader" class="py-3 px-3 text-center hidden w-16">Edit</th>
                    </tr>
                </thead>
                <tbody id="tableBody" class="text-sm">
                    <tr><td colspan="6" class="py-12 text-center text-gray-500"><div class="loader mb-2"></div><br>Syncing with Turso Database...</td></tr>
                </tbody>
            </table>
        </div>

        <button id="fabAdd" onclick="openModal()" class="hidden fixed bottom-6 right-6 bg-blue-600 text-white w-14 h-14 rounded-full shadow-xl flex items-center justify-center text-3xl hover:bg-blue-700 transition transform hover:scale-105 z-20">
            +
        </button>
    </div>

    <div id="itemModal" class="hidden fixed inset-0 bg-black bg-opacity-60 z-50 flex items-end md:items-center justify-center">
        <div class="bg-white w-full md:w-[32rem] rounded-t-2xl md:rounded-2xl p-6 transform transition-all shadow-2xl max-h-[90vh] overflow-y-auto hide-scrollbar">
            <div class="flex justify-between items-center mb-5 border-b pb-3">
                <h3 id="modalTitle" class="text-xl font-bold text-gray-800">Add New Item</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 text-3xl font-light leading-none">&times;</button>
            </div>
            
            <input type="hidden" id="edit_sl_no">
            
            <div class="space-y-4 text-sm">
                <div class="grid grid-cols-2 gap-3">
                    <div class="col-span-2 sm:col-span-1">
                        <label class="text-gray-600 text-xs font-bold mb-1 block">Product Name</label>
                        <input type="text" id="m_name" placeholder="e.g. Parle G 5rs" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                    </div>
                    <div class="col-span-2 sm:col-span-1">
                        <label class="text-gray-600 text-xs font-bold mb-1 block">Category</label>
                        <input type="text" id="m_cat" placeholder="e.g. parle" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                    </div>
                </div>

                <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 grid grid-cols-3 gap-2">
                    <div class="col-span-3 text-xs font-bold text-blue-800 mb-1">Packaging Rules (1 Sec = X Basic)</div>
                    <div>
                        <label class="text-gray-500 text-[10px] uppercase font-bold">Sec Unit</label>
                        <input type="text" id="m_sec_unit" placeholder="box" class="w-full p-2 border rounded focus:ring-1 focus:ring-blue-400 outline-none">
                    </div>
                    <div>
                        <label class="text-gray-500 text-[10px] uppercase font-bold">Qty (=)</label>
                        <input type="number" id="m_conv_qty" placeholder="12" class="w-full p-2 border rounded focus:ring-1 focus:ring-blue-400 outline-none text-center">
                    </div>
                    <div>
                        <label class="text-gray-500 text-[10px] uppercase font-bold">Basic Unit</label>
                        <input type="text" id="m_basic_unit" placeholder="pkt" class="w-full p-2 border rounded focus:ring-1 focus:ring-blue-400 outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-3 gap-3">
                    <div>
                        <label class="text-gray-600 text-xs font-bold mb-1 block">Basic Rate</label>
                        <input type="number" id="m_basic_rate" placeholder="₹" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-mono">
                    </div>
                    <div>
                        <label class="text-gray-600 text-xs font-bold mb-1 block">Whole Rate</label>
                        <input type="number" id="m_whole_rate" placeholder="₹" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50 font-mono">
                    </div>
                    <div>
                        <label class="text-gray-600 text-xs font-bold mb-1 block">Stock (Basic)</label>
                        <input type="number" id="m_stock" placeholder="0" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                    </div>
                </div>

                <div>
                    <label class="text-gray-600 text-xs font-bold mb-1 block">Remarks / Notes</label>
                    <input type="text" id="m_remarks" placeholder="Optional notes for salesman" class="w-full p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-gray-50">
                </div>
                
                <button onclick="saveItem()" id="saveBtn" class="w-full bg-green-600 text-white font-bold py-3.5 mt-4 rounded-lg hover:bg-green-700 transition shadow-md">Save Product</button>
            </div>
        </div>
    </div>

    <script>
        const TURSO_URL = "https://corsproxy.io/?url=https://rate-itagi99.aws-ap-south-1.turso.io";
        const TURSO_TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3ODIyMzAyNjgsImlkIjoiMDE5ZWY1MjItNDgwMS03MzFkLWEwNDMtOTEyMmZiYThiNjI2IiwicmlkIjoiZGExNWI0ZWEtZWJmNi00MjQ5LTk1YjUtYmMzZTg2NGNmYzdhIn0.SAcQ9gl2S0jjDXVNxxqfjd0bx8UkJGXRX94hlUjPPTQ46L6frO0xbCP7nv_1KziQPoeRTOVGZtFOLxr0P0WzAw";

        let products = [];
        let currentUserRole = "viewer";

        function login() {
            const u = document.getElementById("username").value;
            const p = document.getElementById("password").value;
            
            if (u === "admin" && p === "admin123") {
                currentUserRole = "admin";
                document.getElementById("userRoleDisplay").innerText = "Admin Access (Edit Mode)";
                document.getElementById("fabAdd").classList.remove("hidden");
                document.getElementById("editColHeader").classList.remove("hidden");
                enterApp();
            } else if (u === "a" && p === "a123") {
                currentUserRole = "viewer";
                document.getElementById("userRoleDisplay").innerText = "Salesman View (Read Only)";
                document.getElementById("fabAdd").classList.add("hidden");
                document.getElementById("editColHeader").classList.add("hidden");
                enterApp();
            } else {
                document.getElementById("loginError").classList.remove("hidden");
            }
        }

        function enterApp() {
            document.getElementById("loginError").classList.add("hidden");
            document.getElementById("loginScreen").classList.add("hidden");
            document.getElementById("appScreen").classList.remove("hidden");
            fetchRates();
        }

        function logout() {
            currentUserRole = "viewer";
            document.getElementById("appScreen").classList.add("hidden");
            document.getElementById("loginScreen").classList.remove("hidden");
            document.getElementById("username").value = "";
            document.getElementById("password").value = "";
        }

        async function fetchRates() {
            try {
                const response = await fetch(`${TURSO_URL}/v2/pipeline`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${TURSO_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        requests: [
                            { type: "execute", stmt: { sql: "SELECT * FROM products ORDER BY sl_no ASC" } },
                            { type: "close" }
                        ]
                    })
                });

                const data = await response.json();

                // Explicitly check for Turso SQL errors
                if (data.results && data.results[0].type === "error") {
                    throw new Error("Turso Error: " + data.results[0].error.message);
                }

                const result = data.results[0].response.result;
                const columns = result.cols.map(c => c.name);
                
                products = result.rows.map(row => {
                    let obj = {};
                    row.forEach((value, index) => { obj[columns[index]] = value.value; });
                    return obj;
                });

                populateCategories();
                renderTable(products);
            } catch (error) {
                let errorMsg = error.message.includes("CORS") || error.message === "Failed to fetch" 
                    ? "Network/CORS Error: Browser blocked connection. Please check console." 
                    : error.message;

                document.getElementById("tableBody").innerHTML = `<tr><td colspan="6" class="py-8 text-center text-red-500 font-bold">${errorMsg}</td></tr>`;
                console.error("Fetch Error:", error);
            }
        }

        function populateCategories() {
            const select = document.getElementById("categoryFilter");
            const currentVal = select.value;
            select.innerHTML = '<option value="ALL">All Categories</option>'; 
            
            const uniqueCategories = [...new Set(products.map(p => p.category))].filter(Boolean).sort();
            uniqueCategories.forEach(category => {
                const option = document.createElement("option");
                option.value = category;
                option.textContent = category.toUpperCase();
                select.appendChild(option);
            });
            select.value = currentVal || "ALL"; 
        }

        function renderTable(data) {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = ""; 

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="py-12 text-center text-gray-500">No matching products found.</td></tr>`;
                return;
            }

            data.forEach((item, index) => {
                const rowClass = index % 2 === 0 ? "bg-white" : "bg-gray-50/50";
                const stockColor = (item.stock_basic_units === null || item.stock_basic_units <= 0) ? 'text-red-500 font-bold' : 'text-gray-800';
                const remarksBadge = item.remarks ? `<span class="mt-1 inline-block bg-yellow-100 text-yellow-800 text-[10px] px-2 py-0.5 rounded-sm border border-yellow-200">${item.remarks}</span>` : '';
                
                let editCell = "";
                if (currentUserRole === "admin") {
                    editCell = `<td class="py-3 px-3 text-center align-top">
                                    <button onclick="openModal(${item.sl_no})" class="bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1.5 rounded hover:bg-blue-600 hover:text-white transition shadow-sm font-medium">Edit</button>
                                </td>`;
                }

                const tr = document.createElement("tr");
                tr.className = `${rowClass} border-b border-gray-100 hover:bg-blue-50/30 transition`;
                tr.innerHTML = `
                    <td class="py-3 px-3 text-center text-gray-500 align-top pt-4">${item.sl_no}</td>
                    <td class="py-3 px-3 align-top">
                        <div class="font-bold text-gray-900 text-[15px]">${item.product_name}</div>
                        <div class="text-[11px] text-gray-500 font-medium tracking-wide mb-1">
                            1 ${item.secondary_unit || '-'} = ${item.conversion_qty || 0} ${item.basic_unit || '-'}
                        </div>
                        ${remarksBadge}
                    </td>
                    <td class="py-3 px-3 text-center align-top pt-4 font-mono font-semibold text-gray-700">${item.basic_rate || 0}</td>
                    <td class="py-3 px-3 text-center align-top pt-4 font-mono font-bold text-green-700">${item.wholesale_rate || 0}</td>
                    <td class="py-3 px-3 text-center align-top pt-4 ${stockColor}">${item.stock_basic_units || '0'}</td>
                    ${editCell}
                `;
                tbody.appendChild(tr);
            });
        }

        function handleFilter() {
            const searchTerm = document.getElementById("searchInput").value.toLowerCase();
            const categoryFilter = document.getElementById("categoryFilter").value;

            const filteredData = products.filter(product => {
                const name = (product.product_name || "").toLowerCase();
                const remarks = (product.remarks || "").toLowerCase();
                const matchesSearch = name.includes(searchTerm) || remarks.includes(searchTerm);
                const matchesCategory = categoryFilter === "ALL" || product.category === categoryFilter;
                return matchesSearch && matchesCategory;
            });

            renderTable(filteredData);
        }

        document.getElementById("searchInput").addEventListener("input", handleFilter);
        document.getElementById("categoryFilter").addEventListener("change", handleFilter);

        function openModal(sl_no = null) {
            if (currentUserRole !== "admin") return; 

            document.getElementById("itemModal").classList.remove("hidden");
            const title = document.getElementById("modalTitle");
            
            if (sl_no) {
                title.innerText = "Edit Product";
                const item = products.find(p => p.sl_no === sl_no);
                
                document.getElementById("edit_sl_no").value = item.sl_no;
                document.getElementById("m_name").value = item.product_name || "";
                document.getElementById("m_cat").value = item.category || "";
                document.getElementById("m_sec_unit").value = item.secondary_unit || "";
                document.getElementById("m_conv_qty").value = item.conversion_qty || "";
                document.getElementById("m_basic_unit").value = item.basic_unit || "";
                document.getElementById("m_basic_rate").value = item.basic_rate || "";
                document.getElementById("m_whole_rate").value = item.wholesale_rate || "";
                document.getElementById("m_stock").value = item.stock_basic_units || 0;
                document.getElementById("m_remarks").value = item.remarks || "";
            } else {
                title.innerText = "Add New Product";
                document.getElementById("edit_sl_no").value = "";
                document.getElementById("m_name").value = "";
                document.getElementById("m_cat").value = "";
                document.getElementById("m_sec_unit").value = "box";
                document.getElementById("m_conv_qty").value = "";
                document.getElementById("m_basic_unit").value = "pkt";
                document.getElementById("m_basic_rate").value = "";
                document.getElementById("m_whole_rate").value = "";
                document.getElementById("m_stock").value = "0";
                document.getElementById("m_remarks").value = "";
            }
        }

        function closeModal() {
            document.getElementById("itemModal").classList.add("hidden");
        }

        async function saveItem() {
            if (currentUserRole !== "admin") return;

            const btn = document.getElementById("saveBtn");
            btn.innerHTML = `<div class="loader border-t-white border-white mr-2"></div> Saving...`;
            btn.disabled = true;

            const sl_no = document.getElementById("edit_sl_no").value;
            const name = document.getElementById("m_name").value;
            const cat = document.getElementById("m_cat").value;
            const sec_unit = document.getElementById("m_sec_unit").value;
            const conv_qty = document.getElementById("m_conv_qty").value;
            const basic_unit = document.getElementById("m_basic_unit").value;
            const basic_rate = document.getElementById("m_basic_rate").value;
            const whole_rate = document.getElementById("m_whole_rate").value;
            const stock = document.getElementById("m_stock").value;
            const remarks = document.getElementById("m_remarks").value;

            let sqlQuery = "";
            let sqlArgs = [
                { type: "text", value: name },
                { type: "text", value: sec_unit },
                { type: "integer", value: parseInt(conv_qty) || 1 },
                { type: "text", value: basic_unit },
                { type: "text", value: cat },
                { type: "integer", value: parseInt(stock) || 0 },
                { type: "float", value: parseFloat(basic_rate) || 0 },
                { type: "float", value: parseFloat(whole_rate) || 0 },
                { type: "text", value: remarks }
            ];

            if (sl_no) {
                sqlQuery = `UPDATE products SET 
                            product_name=?, secondary_unit=?, conversion_qty=?, basic_unit=?, category=?, 
                            stock_basic_units=?, basic_rate=?, wholesale_rate=?, remarks=? 
                            WHERE sl_no=?`;
                sqlArgs.push({ type: "integer", value: parseInt(sl_no) });
            } else {
                sqlQuery = `INSERT INTO products 
                            (product_name, secondary_unit, conversion_qty, basic_unit, category, stock_basic_units, basic_rate, wholesale_rate, remarks) 
                            VALUES (?, ?, ?, ?, ?, ?, ?, ?, ?)`;
            }

            try {
                const response = await fetch(`${TURSO_URL}/v2/pipeline`, {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${TURSO_TOKEN}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        requests: [
                            { type: "execute", stmt: { sql: sqlQuery, args: sqlArgs } },
                            { type: "close" }
                        ]
                    })
                });

                const data = await response.json();

                if (data.results && data.results[0].type === "error") {
                    throw new Error("Turso Database Error: " + data.results[0].error.message);
                }

                closeModal();
                await fetchRates(); 
            } catch (error) {
                alert(error.message.includes("CORS") || error.message === "Failed to fetch" 
                    ? "Network/CORS Error: Cannot connect to Turso from browser. Check console." 
                    : error.message);
                console.error("Save Error:", error);
            } finally {
                btn.innerText = "Save Product";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
